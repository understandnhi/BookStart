{% extends "base.html" %}

{% block title %}Tạo Đơn Thuê Sách{% endblock %}

{% block content %}
<h2 class="mb-4">Tạo Đơn Thuê Sách</h2>

<!-- Form nhập thông tin khách hàng -->
<div class="card p-4 mb-3">
    <h5>Thông tin khách hàng</h5>
    <div class="mb-3">
        <label class="form-label">Tên khách hàng</label>
        <input type="text" id="customer_name" class="form-control" placeholder="Nhập tên khách hàng" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Số điện thoại</label>
        <input type="text" id="customer_phone" class="form-control" placeholder="Nhập số điện thoại" required>
    </div>
</div>

<!-- Form nhập thông tin sách thuê -->
<div class="card p-4 mb-3">
    <h5>Danh sách sách thuê</h5>
    <div class="table-responsive">
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID sách</th>
                    <th>Tên sách</th>
                    <th class="d-none d-md-table-cell">Giá thuê</th>
                    <th>Số lượng</th>
                    <th class="d-none d-md-table-cell">Tổng tiền sách</th>
                    <th>Ngày trả</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="books_list">
                <tr class="book-entry" data-index="0">
                    <td data-label="ID sách"><input type="number" class="form-control book_id" placeholder="ID sách" min="1" required></td>
                    <td data-label="Tên sách"><span class="book_title"></span></td>
                    <td data-label="Giá thuê" class="d-none d-md-table-cell"><span class="rental_price"></span></td>
                    <td data-label="Số lượng"><input type="number" class="form-control rental_quantity" placeholder="Số lượng" min="1" value="1" required></td>
                    <td data-label="Tổng tiền sách" class="d-none d-md-table-cell"><span class="item_total">0</span> VND</td>
                    <td data-label="Ngày trả"><input type="datetime-local" class="form-control return_due_date" required></td>
                    <td data-label="Hành động">
                        <button class="btn btn-danger btn-sm remove-book" title="Xóa">🗑️</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <button id="add_book" class="btn btn-primary mt-2">Thêm sách</button>
    <div class="mt-3 total-price">
        Tổng tiền: <span id="total_price">0</span> VND
    </div>
</div>

<!-- Nút gửi đơn thuê -->
<button id="submit_rental" class="btn btn-success">Tạo Đơn Thuê</button>

<!-- Thông báo kết quả -->
<div id="message" class="mt-3"></div>

<style>
    .book-entry td {
        vertical-align: middle;
    }
    .remove-book {
        padding: 5px 10px;
    }
</style>

<script>
    $(document).ready(function() {
        let bookIndex = 0;

        // Lấy thông tin sách khi nhập ID sách
        $(document).on("input", ".book_id", function() {
            const row = $(this).closest("tr");
            const bookId = $(this).val();
            const index = row.data("index");
            const messageDiv = $("#message");

            if (!bookId) {
                row.find(".book_title").text("");
                row.find(".rental_price").text("");
                row.find(".item_total").text("0");
                updateTotalPrice();
                return;
            }

            $.ajax({
                url: `/books/${bookId}/info`,
                type: "GET",
                success: function(data) {
                    row.find(".book_title").text(data.title);
                    row.find(".rental_price").text(`${data.rental_price} VND`);
                    row.find(".rental_quantity").attr("max", data.quantity);
                    updateItemTotal(row);
                    messageDiv.html("");
                },
                error: function(xhr) {
                    messageDiv.html(`<div class="alert alert-danger">${xhr.responseJSON.message}</div>`);
                    row.find(".book_title").text("");
                    row.find(".rental_price").text("");
                    row.find(".item_total").text("0");
                    updateTotalPrice();
                }
            });
        });

        // Cập nhật tổng tiền cho một sách
        function updateItemTotal(row) {
            const quantity = parseInt(row.find(".rental_quantity").val()) || 0;
            const priceText = row.find(".rental_price").text().replace(" VND", "");
            const price = parseFloat(priceText) || 0;
            const itemTotal = quantity * price;
            row.find(".item_total").text(itemTotal);
            updateTotalPrice();
        }

        // Cập nhật tổng tiền toàn đơn
        function updateTotalPrice() {
            let total = 0;
            $("#books_list tr").each(function() {
                const itemTotal = parseFloat($(this).find(".item_total").text()) || 0;
                total += itemTotal;
            });
            $("#total_price").text(total);
        }

        // Cập nhật tổng tiền khi thay đổi số lượng
        $(document).on("input", ".rental_quantity", function() {
            const row = $(this).closest("tr");
            updateItemTotal(row);
        });

        // Thêm dòng mới để nhập thông tin sách
        $("#add_book").click(function() {
            bookIndex++;
            $("#books_list").append(`
                <tr class="book-entry" data-index="${bookIndex}">
                    <td data-label="ID sách"><input type="number" class="form-control book_id" placeholder="ID sách" min="1" required></td>
                    <td data-label="Tên sách"><span class="book_title"></span></td>
                    <td data-label="Giá thuê" class="d-none d-md-table-cell"><span class="rental_price"></span></td>
                    <td data-label="Số lượng"><input type="number" class="form-control rental_quantity" placeholder="Số lượng" min="1" value="1" required></td>
                    <td data-label="Tổng tiền sách" class="d-none d-md-table-cell"><span class="item_total">0</span> VND</td>
                    <td data-label="Ngày trả"><input type="datetime-local" class="form-control return_due_date" required></td>
                    <td data-label="Hành động">
                        <button class="btn btn-danger btn-sm remove-book" title="Xóa">🗑️</button>
                    </td>
                </tr>
            `);
        });

        // Xóa dòng nhập sách
        $(document).on("click", ".remove-book", function() {
            $(this).closest("tr").remove();
            updateTotalPrice();
        });

        // Gửi yêu cầu tạo đơn thuê
        $("#submit_rental").click(function() {
            const customer_name = $("#customer_name").val();
            const customer_phone = $("#customer_phone").val();
            const books = [];
            let valid = true;

            // Lấy danh sách sách thuê
            $("#books_list tr").each(function() {
                const book_id = $(this).find(".book_id").val();
                const rental_quantity = $(this).find(".rental_quantity").val();
                const return_due_date = $(this).find(".return_due_date").val();
                const book_title = $(this).find(".book_title").text();

                if (book_id && rental_quantity && return_due_date && book_title) {
                    books.push({
                        book_id: parseInt(book_id),
                        rental_quantity: parseInt(rental_quantity),
                        return_due_date: new Date(return_due_date).toISOString()
                    });
                } else {
                    valid = false;
                }
            });

            if (!customer_name || !customer_phone || books.length === 0 || !valid) {
                $("#message").html('<div class="alert alert-danger">Vui lòng nhập đầy đủ thông tin và kiểm tra ID sách!</div>');
                return;
            }

            // Gửi API tạo đơn thuê
            $.ajax({
                url: "/rentals",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify({
                    customer_name: customer_name,
                    customer_phone: customer_phone,
                    books: books
                }),
                success: function(response) {
                    $("#message").html(`<div class="alert alert-success">${response.message} ID: ${response.rental_id}, Tổng tiền: ${response.total_price} VND</div>`);
                    // Reset form
                    $("#customer_name").val("");
                    $("#customer_phone").val("");
                    $("#books_list").html(`
                        <tr class="book-entry" data-index="0">
                            <td data-label="ID sách"><input type="number" class="form-control book_id" placeholder="ID sách" min="1" required></td>
                            <td data-label="Tên sách"><span class="book_title"></span></td>
                            <td data-label="Giá thuê" class="d-none d-md-table-cell"><span class="rental_price"></span></td>
                            <td data-label="Số lượng"><input type="number" class="form-control rental_quantity" placeholder="Số lượng" min="1" value="1" required></td>
                            <td data-label="Tổng tiền sách" class="d-none d-md-table-cell"><span class="item_total">0</span> VND</td>
                            <td data-label="Ngày trả"><input type="datetime-local" class="form-control return_due_date" required></td>
                            <td data-label="Hành động">
                                <button class="btn btn-danger btn-sm remove-book" title="Xóa">🗑️</button>
                            </td>
                        </tr>
                    `);
                    $("#total_price").text("0");
                    bookIndex = 0;
                },
                error: function(xhr) {
                    $("#message").html(`<div class="alert alert-danger">${xhr.responseJSON.message}</div>`);
                }
            });
        });
    });
</script>
{% endblock %}
