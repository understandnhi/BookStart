<!DOCTYPE html>
<html>
<head>
    <title>Sửa thông tin nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded shadow-md w-96">
        <h2 class="text-2xl font-bold mb-4 text-center">Sửa thông tin nhân viên</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-green-100 text-green-700 p-2 mb-4 rounded">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-4">
                <label class="block text-gray-700">Tên đăng nhập</label>
                <input type="text" name="username" value="{{ user.username }}" class="w-full p-2 border rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Mật khẩu mới (để trống nếu không đổi)</label>
                <input type="password" name="password" class="w-full p-2 border rounded">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Họ tên</label>
                <input type="text" name="name" value="{{ user.name }}" class="w-full p-2 border rounded" required>
            </div>
            <div class="mb-4">
                <label class="block text-gray-700">Email</label>
                <input type="email" name="email" value="{{ user.email or '' }}" class="w-full p-2 border rounded">
            </div>
            <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Cập nhật</button>
        </form>
        <a href="{{ url_for('admin_views.admin_dashboard') }}" class="block text-center mt-4 text-blue-500 hover:underline">Quay lại</a>
    </div>
</body>
</html>
