<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <!-- Menu điều hướng -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">📚 BOOKSTART</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if session.role == 'admin' %}
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'admin_views.admin_dashboard' %} active{% endif %}" href="{{ url_for('admin_views.admin_dashboard') }}">🧑‍💼 Quản lý Nhân viên</a>
                    </li>
                    {% endif %}
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'views.index' %} active{% endif %}" href="{{ url_for('views.index') }}">📖 Quản lý Sách</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'customer_views.manage_customers' %} active{% endif %}" href="{{ url_for('customer_views.manage_customers') }}">👤 Quản lý Khách hàng</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link{% if request.endpoint == 'rental_views.manage_rentals' %} active{% endif %}" href="{{ url_for('rental_views.manage_rentals') }}">📖 Quản lý đơn thuê</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('admin_views.logout') }}">🚪 Đăng xuất</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    <script>
        // Cấu hình toastr
        toastr.options = {
            closeButton: true,
            progressBar: true,
            positionClass: 'toast-top-right',
            timeOut: 5000
        };

        // Hiển thị thông báo flash nếu có
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                toastr.success('{{ messages[0] }}');
            {% endif %}
        {% endwith %}
    </script>
</body>
</html>
